name: PR Attribution Check

on:
  pull_request:
    types: [opened, edited, synchronize]

concurrency:
  group: pr-attribution-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-pr-attribution:
    name: Check PR Attribution
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || '';
            const body = pr.body || '';
            const errors = [];
            const warnings = [];

            const agentPattern = /^\*\*Agent:\*\*\s+.+/i;
            if (!agentPattern.test(body.trim())) {
              errors.push('❌ PR description missing agent attribution. Add `**Agent:** [Model Name]` at the top.');
            }

            const coauthorPattern = /^\*\*Co-authored-by:\*\*\s+(Chimera|ChimeraDeFi)\s+<chimera_defi@protonmail\.com>/im;
            if (!coauthorPattern.test(body)) {
              errors.push('❌ PR description missing canonical human co-author attribution. Add `**Co-authored-by:** Chimera <chimera_defi@protonmail.com>`');
            }

            if (!/##\s*Original\s*Request/i.test(body)) {
              errors.push('❌ PR description missing `## Original Request` section.');
            }

            const badTitlePatterns = [/user\s+asked/i, /as\s+requested/i];
            if (badTitlePatterns.some((pattern) => pattern.test(title))) {
              warnings.push('⚠️ PR title appears to reference the prompt rather than the change.');
            }

            if (errors.length > 0 || warnings.length > 0) {
              let comment = '## PR Attribution Check\n\n';
              if (errors.length > 0) {
                comment += '### ❌ Required Fixes\n';
                errors.forEach(err => comment += `- ${err}\n`);
                comment += '\n';
              }
              if (warnings.length > 0) {
                comment += '### ⚠️ Suggestions\n';
                warnings.forEach(warn => comment += `- ${warn}\n`);
                comment += '\n';
              }
              comment += 'See `AGENTS.md` for the required attribution pattern.\n';

              const issue_number = pr.number;
              const { owner, repo } = context.repo;
              const { data: comments } = await github.rest.issues.listComments({
                issue_number,
                owner,
                repo,
                per_page: 100
              });
              const attributionComment = comments.find((c) =>
                c.user && c.user.type === 'Bot' &&
                typeof c.body === 'string' &&
                c.body.startsWith('## PR Attribution Check')
              );
              if (attributionComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: attributionComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number,
                  owner,
                  repo,
                  body: comment
                });
              }

              if (errors.length > 0) {
                core.setFailed('PR attribution check failed. See PR comment for details.');
              }
            }
